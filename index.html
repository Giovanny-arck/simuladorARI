<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cálculo de Investimento ARI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- imagem ARI banner -->
<div class="image-container">
    <img src="/img banner/Capa banner formulário.png" alt="Investimento ARI" class="form-responsive-image">
</div>
<div class="container">
    
    <!-- Box de Dados do Cliente -->
    <div class="form-section">
        <h3>Dados do Cliente</h3>
        <div class="grid">
            <div>
                <label>Cliente</label>
                <input type="text" id="cliente">
            </div>
            <div>
                <label>E-mail</label>
                <input type="email" id="email">
            </div>
            <div>
                <label>Profissão</label>
                <input type="text" id="profissao">
            </div>
            <div>
                <label>Contato</label>
                <input type="text" id="contato">
            </div>
        </div>
    </div>

    <!-- Box de Dados do Investimento -->
    <div class="form-section">
        <h3>Dados do Investimento</h3>
        <div class="grid">
            <div>
                <label>Valor Investido (R$)</label>
                <input type="text" id="valor" required>
            </div>
            <div>
                <label>Forma de Recebimento</label>
                <select id="forma" required onchange="atualizarColunas()">
                    <option value="">-- Selecione --</option>
                    <option value="mensal">Rendimento Mensal</option>
                    <option value="final">Rendimento no Final</option>
                </select>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button type="button" onclick="calcular()">Calcular</button>
        <button type="button" onclick="exportarPDF()">Exportar PDF</button>
    </div>

    <table id="resultado" style="display:none;">
        <thead>
            <tr>
                <th>Prazo</th>
                <th class="col-mensal">Rendimento Mensal (R$)</th>
                <th class="col-final">Rendimento Final (R$)</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="script.js"></script>
</body>
</html>
