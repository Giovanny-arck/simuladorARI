<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cálculo de Investimento ARI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- imagem ARI banner -->
<div class="image-container">
    <img src="/img banner/Cópia capa simulador.png" alt="Investimento ARI" class="form-responsive-image">
</div>
<div class="container">
    
    <!-- Box de Dados do Cliente -->
    <div class="form-section">
        <h3>Dados do Cliente <span class="obrigatorio">*</span></h3>
        <div class="grid grid-cliente">
            <div>
                <label>Cliente <span class="obrigatorio">*</span></label>
                <input type="text" id="cliente" required placeholder="Nome Completo">
            </div>
            <div>
                <label>E-mail <span class="obrigatorio">*</span></label>
                <input type="email" id="email" required>
            </div>
            <div>
                <label>Profissão <span class="obrigatorio">*</span></label>
                <input type="text" id="profissao" required>
            </div>
            <div>
                <label>Contato <span class="obrigatorio">*</span></label>
                <input type="text" id="contato" required placeholder="(DDD) XXXXX-XXXX" maxlength="12" minlength="9">
            </div>
        </div>
        <div class="btn-group">
            <button type="button" id="btn-proximo" onclick="avancarParaInvestimento()" disabled style="opacity: 0.6; cursor: not-allowed;">Próximo</button>
        </div>
    </div>

    <!-- Box de Dados do Investimento -->
    <div class="form-section dados-investimento" style="display: none;">
        <h3>Dados do Investimento <span class="obrigatorio">*</span></h3>
        <div class="grid-investimento">
            <div class="valor-investido-container">
                <label>Valor Investido (R$) <span class="obrigatorio">*</span></label>
                <input type="text" id="valor" list="valoresSugeridos" placeholder="Digite ou selecione" required min="20000">
                <datalist id="valoresSugeridos">
                    <option value="R$ 20.000,00">
                    <option value="R$ 30.000,00">
                    <option value="R$ 40.000,00">
                    <option value="R$ 50.000,00">
                    <option value="R$ 75.000,00">
                    <option value="R$ 100.000,00">
                    <option value="R$ 125.000,00">
                    <option value="R$ 150.000,00">
                    <option value="R$ 200.000,00">
                    <option value="R$ 250.000,00">
                    <option value="R$ 300.000,00">
                    <option value="R$ 400.000,00">
                </datalist>
                <div id="tabela-faixas" style="display: none; margin-top: 15px;">
                    <h4>Investimentos</h4>
                    <table class="tabela-faixas">
                        <tr><th>Faixa</th><th>Valor</th><th>Taxa Extra</th></tr>
                        <tr><td>Tabela 1</td><td>50.000 a 99.999</td><td>0,00%</td></tr>
                        <tr><td>Tabela 2</td><td>100.000 a 199.999</td><td>0,20%</td></tr>
                        <tr><td>Tabela 3</td><td>200.000 a 399.999</td><td>0,40%</td></tr>
                        <tr><td>Tabela 4</td><td>Acima de 400.000</td><td>0,60%</td></tr>
                    </table>
                </div>
            </div>
            
            <div class="forma-recebimento-container" id="container-forma-recebimento" style="display: none;">
                <label>Forma de Recebimento <span class="obrigatorio">*</span></label>
                <div class="button-group">
                    <button type="button" id="btn-mensal" class="recebimento-btn" onclick="selecionarForma('mensal')">Rendimento Mensal</button>
                    <button type="button" id="btn-final" class="recebimento-btn" onclick="selecionarForma('final')">Rendimento no Final</button>
                </div>
            </div>
        </div>
        
        <!-- Tabela de Resultados -->
        <div id="tabela-resultados" style="display: none;">
            <table id="resultado">
                <thead id="resultado-head">
                    <!-- Será preenchido dinamicamente -->
                </thead>
                <tbody id="resBody"></tbody>
            </table>
        </div>
        
        <!-- Seleção de Prazo -->
        <div class="form-section" id="selecao-prazo" style="display: none;">
            <h3>Selecione o seu prazo <span class="obrigatorio">*</span></h3>
            <div class="button-group">
                <button type="button" class="prazo-btn" onclick="selecionarPrazo(18)">18 meses</button>
                <button type="button" class="prazo-btn" onclick="selecionarPrazo(24)">24 meses</button>
                <button type="button" class="prazo-btn" onclick="selecionarPrazo(36)">36 meses</button>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button type="button" id="btn-enviar" onclick="enviarProposta()" style="display: none;">Enviar Proposta</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="script.js"></script>
</body>
</html>
